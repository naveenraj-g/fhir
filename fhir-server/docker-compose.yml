version: "3.9"

services:
  api:
    image: ghcr.io/naveenraj-g/fhir-server:latest
    # build: .    # uncomment to build locally instead of pulling
    container_name: fhir-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - bezs-net

  db:
    image: postgres:15-alpine
    container_name: fhir-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-fhir-server}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fhir-server}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - bezs-net

  redis:
    image: redis:7-alpine
    container_name: fhir-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    networks:
      - bezs-net

volumes:
  postgres_data:
  redis_data:

networks:
  bezs-net:
    driver: bridge
